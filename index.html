<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://getbootstrap.com/docs/5.3/assets/css/docs.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div class="container mt-5">
        <h2 class="mb-4">Task List</h2>

        <div class="d-flex flex-wrap align-items-stretch gap-2 mb-2" style="max-width: 720px;">
            <div class="input-group flex-grow">
                <input type="text" id="titleInput" class="form-control" placeholder="Новая задача...">
                <button id="addTask" class="btn btn-primary">Добавить</button>
            </div>
            <button type="button" id="clearBoard" class="btn btn-outline-danger">Очистить доску</button>
        </div>
        <div class="d-flex flex-wrap align-items-center gap-2 mb-2 text-secondary small" style="max-width: 720px;">
            <span class="text-nowrap">Срок</span>
            <input type="date" id="dueDateInput" class="form-control form-control-sm" style="max-width: 900px;">
        </div>

        

        
        <div id="board" class="row g-3">

        </div>
    </div>
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script3.js"></script>
</body>
</html>
